# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    server_name aigc.guangai.ai api.aigc.guangai.ai cdn.aigc.guangai.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- aigc.guangai.ai — Console ---
server {
    listen 443 ssl;
    http2 on;
    server_name aigc.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/aigc.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.guangai.ai/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 10m;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# --- api.aigc.guangai.ai — API Gateway ---
server {
    listen 443 ssl;
    http2 on;
    server_name api.aigc.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/aigc.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.guangai.ai/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    client_max_body_size 2m;

    # SSE streaming: disable buffering
    proxy_buffering off;
    proxy_cache off;

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# --- cdn.aigc.guangai.ai — Static / CDN ---
server {
    listen 443 ssl;
    http2 on;
    server_name cdn.aigc.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/aigc.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.guangai.ai/privkey.pem;
    include             /etc/nginx/ssl-params.conf;

    # Static assets with aggressive caching
    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://app:3000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
