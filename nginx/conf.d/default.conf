# --- HTTP: ACME challenge + redirect to HTTPS ---
server {
    listen 80;
    server_name aigc.guangai.ai cdn.aigc.guangai.ai;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- aigc.guangai.ai — Console + API Gateway ---
server {
    listen 443 ssl http2;
    server_name aigc.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/aigc.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.guangai.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    client_max_body_size 10m;

    # gzip compression for JSON API responses
    gzip on;
    gzip_types application/json text/plain text/css application/javascript;
    gzip_min_length 1024;
    gzip_comp_level 4;
    gzip_vary on;

    # /v1/models: non-streaming, allow buffering so nginx can gzip
    location = /v1/models {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SSE streaming: disable buffering for API paths
    location /v1/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    location /api/webhooks/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }
}

# --- cdn.aigc.guangai.ai — Static / CDN ---
server {
    listen 443 ssl http2;
    server_name cdn.aigc.guangai.ai;

    ssl_certificate     /etc/letsencrypt/live/aigc.guangai.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/aigc.guangai.ai/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;

    # Static assets with aggressive caching
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            proxy_pass http://localhost:3000;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }
}
