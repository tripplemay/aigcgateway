name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Lint, Build & Push Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/aigc-gateway

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Install dependencies ==="
            NODE_OPTIONS="--max-old-space-size=512" npm ci --production=false

            echo "=== Prisma generate + migrate ==="
            npx prisma generate
            source .env.production
            DATABASE_URL="$DATABASE_URL" npx prisma migrate deploy

            echo "=== Build ==="
            NODE_OPTIONS="--max-old-space-size=512" npm run build

            echo "=== Copy static to standalone ==="
            cp -r .next/static .next/standalone/.next/static
            mkdir -p .next/standalone/public

            echo "=== Restart PM2 ==="
            pm2 restart aigc-gateway || pm2 start ecosystem.config.cjs

            echo "=== Waiting for app ==="
            sleep 3

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            MAX_RETRIES=10
            RETRY=0
            until curl -sf http://localhost:3000/v1/models > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "Health check failed after $MAX_RETRIES attempts"
                pm2 logs aigc-gateway --lines 30 --nostream
                exit 1
              fi
              echo "Retry $RETRY/$MAX_RETRIES..."
              sleep 3
            done
            echo "Health check passed"

      - name: Notify Success
        if: success()
        run: echo "Deployed to production — $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed — check logs above"
          exit 1
