name: Deploy to VPS

on:
  workflow_run:
    workflows: ["CI — Lint, Build & Push Image"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/aigc-gateway

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Pull latest image and restart
            docker compose pull app
            docker compose up -d --remove-orphans

            # Run database migrations
            docker compose exec -T app npx prisma migrate deploy

            # Wait for app to be ready
            echo "Waiting for app to start..."
            sleep 5

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            MAX_RETRIES=10
            RETRY=0
            until curl -sf http://localhost:3000/v1/models > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "Health check failed after $MAX_RETRIES attempts"
                docker compose -f /opt/aigc-gateway/docker-compose.yml logs app --tail=50
                exit 1
              fi
              echo "Retry $RETRY/$MAX_RETRIES..."
              sleep 3
            done
            echo "Health check passed"

      - name: Notify Success
        if: success()
        run: echo "✅ Deployed to production — $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notify Failure
        if: failure()
        run: |
          echo "❌ Deployment failed — check logs above"
          exit 1
