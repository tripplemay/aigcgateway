name: Deploy to VPS

on:
  workflow_dispatch:
    inputs:
      reason:
        description: '部署原因（可选）'
        required: false
        default: 'Manual deploy'

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 10m
          script: |
            set -e
            cd /opt/aigc-gateway

            echo "=== Pull latest code ==="
            git fetch origin main
            git reset --hard origin/main

            echo "=== Stop app to free memory for build ==="
            pm2 stop aigc-gateway 2>/dev/null || true

            echo "=== Clean + Install dependencies ==="
            rm -rf node_modules .next
            npm ci

            echo "=== Prisma generate + migrate ==="
            npx prisma generate
            set -a && source .env.production && set +a
            npx prisma migrate deploy

            echo "=== Build ==="
            npm run build

            echo "=== Copy static to standalone ==="
            cp -r .next/static .next/standalone/.next/static
            mkdir -p .next/standalone/public

            echo "=== Restart PM2 ==="
            pm2 restart aigc-gateway || pm2 start ecosystem.config.cjs

            echo "=== Waiting for app ==="
            sleep 3

      - name: Health Check
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_SSH_PORT }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            MAX_RETRIES=10
            RETRY=0
            until curl -sf http://localhost:3000/v1/models > /dev/null 2>&1; do
              RETRY=$((RETRY + 1))
              if [ $RETRY -ge $MAX_RETRIES ]; then
                echo "Health check failed after $MAX_RETRIES attempts"
                pm2 logs aigc-gateway --lines 30 --nostream
                exit 1
              fi
              echo "Retry $RETRY/$MAX_RETRIES..."
              sleep 3
            done
            echo "Health check passed"

      - name: Notify Success
        if: success()
        run: echo "Deployed to production — $(date -u '+%Y-%m-%d %H:%M UTC')"

      - name: Notify Failure
        if: failure()
        run: |
          echo "Deployment failed — check logs above"
          exit 1
