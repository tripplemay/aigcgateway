name: CI — Lint, Type Check & Unit Tests

on:
  push:
    branches: [main]
    paths-ignore:
      - 'progress.json'
      - 'features.json'
      - 'backlog.json'
      - 'harness-rules.md'
      - 'CLAUDE.md'
      - 'AGENTS.md'
      - '.auto-memory/**'
      - 'docs/**'
      - 'design-draft/**'
      - 'planner.md'
      - 'generator.md'
      - 'evaluator.md'
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    name: Lint, Type Check & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: TypeScript Check
        run: npx tsc --noEmit

      - name: Unit Tests
        run: npx vitest run
