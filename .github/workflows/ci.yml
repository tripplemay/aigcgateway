name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".auto-memory/**"
      - "progress.json"
      - "features.json"
      - "backlog.json"
      - "docs/**"
      - "design-draft/**"
      - "framework/**"
      - "**/*.md"
      - "harness-rules.md"
      - "planner.md"
      - "generator.md"
      - "evaluator.md"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22"
  # CI placeholder secrets — never use in production.
  DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/aigc_gateway?schema=public"
  REDIS_URL: "redis://localhost:6379/0"
  JWT_SECRET: "ci-placeholder-jwt-secret-do-not-use-in-prod-32+"
  ENCRYPTION_KEY: "ci-placeholder-encryption-key-32-bytes-long-aaaa"
  IMAGE_PROXY_SECRET: "ci-placeholder-image-proxy-secret-32-bytes-aaaa"
  ADMIN_SEED_PASSWORD: "Codex@2026!"
  ADMIN_TEST_PASSWORD: "Codex@2026!"
  E2E_TEST_PASSWORD: "Codex@2026!"

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - run: npm run typecheck

  validate-rollback-sql:
    name: Validate migration ROLLBACK SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/validate-rollback-sql.sh

  build:
    name: Build + migrate smoke
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aigc_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Prisma migrate smoke
        run: npx prisma migrate deploy
      - run: npm run build

  unit-tests:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run Vitest unit + coverage
        # Coverage threshold (60/60/50/60) intentionally fails on first
        # baseline run per BL-TEST-INFRA-IMPORT spec design decision —
        # surface the gap, raise threshold in a follow-up batch.
        run: npm run test:coverage
        continue-on-error: true
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info
          retention-days: 14

  integration-tests:
    name: Integration tests (Testcontainers)
    runs-on: ubuntu-latest
    needs: install
    # Testcontainers boots its own postgres:16-alpine per file on random
    # ports; Docker is pre-installed on ubuntu-latest runners so no
    # service container is needed here.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Run integration suite
        run: npm run test:integration

  e2e-tests:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: aigc_gateway
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npx prisma generate
      - name: Apply migrations + seed
        run: |
          npx prisma migrate deploy
          npm run db:seed
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-
      - name: Install Playwright Chromium + system deps
        run: npx playwright install --with-deps chromium
      - name: Run Playwright E2E
        # Existing 3 specs may not all pass on the fresh seed yet;
        # spec accepts "at least 1 PASS + report uploaded". Failing
        # tests are tracked in a follow-up batch.
        run: npx playwright test
        continue-on-error: true
      - name: Upload playwright-report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 14
